version: '3.8'
services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      - SA_PASSWORD=Your_password123
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Your_password123", "-Q", "SELECT 1" ]
      interval: 10s
      retries: 10

  webapi:
    build:
      context: .
      dockerfile: Gizli/Gizli.WebAPI/Dockerfile
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__SqlServer=Server=db,1433;Database=GizliDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True
    restart: on-failure

# Note: Adjust SA_PASSWORD before using in production.
